  collectDone: "&a本次收获 &6{amount}&a 元宝（定金 &e{deposit}&a）"
  noMoreTimes: "&c今日次数已用尽，请等待重置。"
  alreadyPending: "&e你还有未收取的气泡，先把它们收完吧。"
